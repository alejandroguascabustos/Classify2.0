<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classify - Aprende con IA</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/aprende.css}">
    <link rel="shortcut icon" th:href="@{/favicon.ico}" type="image/x-icon">
</head>
<body class="inicioimg aprende-page">
    <div th:replace="~{layout/fragments :: header}"></div>

    <div class="contenidoinicio">
        <div th:replace="~{layout/fragments :: sidebar}"></div>

        <main class="contentaprende">
            <div class="aprende-shell">
                <section class="aprende-hero">
                    <span class="aprende-kicker">Módulo Aprende</span>
                    <h1>Aprende con <span class="aprende-title-accent">IA</span></h1>
                    <p class="aprende-lead">
                        Explica temas, resume conceptos y prepara clases en una respuesta clara y ordenada.
                    </p>
                    <div class="aprende-reference-strip" aria-label="Referencias sugeridas">
                        <span class="aprende-reference-label">Fuentes sugeridas</span>
                        <a href="https://es.khanacademy.org" target="_blank" rel="noopener noreferrer" class="aprende-inline-ref">Khan Academy</a>
                        <a href="https://www.colombiaaprende.edu.co" target="_blank" rel="noopener noreferrer" class="aprende-inline-ref">Colombia Aprende</a>
                        <a href="https://www.britannica.com" target="_blank" rel="noopener noreferrer" class="aprende-inline-ref">Britannica</a>
                        <a href="https://kids.nationalgeographic.com" target="_blank" rel="noopener noreferrer" class="aprende-inline-ref">NatGeo Kids</a>
                    </div>
                </section>

                <section class="aprende-card aprende-composer">
                    <div class="aprende-card-head">
                        <div>
                            <p class="aprende-section-label">Empieza aquí</p>
                            <h2>Escribe el tema que vas a enseñar</h2>
                        </div>
                    </div>

                    <form id="ai-chat-form-start" class="aprende-form" autocomplete="off">
                        <label for="ai-user-query-start">Tema o pregunta</label>
                        <div class="aprende-form-row">
                            <input
                                type="text"
                                id="ai-user-query-start"
                                placeholder="Ej. Fotosíntesis, fracciones o independencia de Colombia"
                                required>
                            <button type="submit" class="aprende-button">Generar</button>
                        </div>
                    </form>

                    <div class="aprende-suggestions" aria-label="Temas sugeridos">
                        <button type="button" class="aprende-chip" data-followup="El ciclo del agua">El ciclo del agua</button>
                        <button type="button" class="aprende-chip" data-followup="La fotosíntesis">La fotosíntesis</button>
                        <button type="button" class="aprende-chip" data-followup="Fracciones básicas">Fracciones básicas</button>
                    </div>
                </section>

                <section id="ai-response-wrapper" class="aprende-response" hidden aria-live="polite"></section>
            </div>
        </main>
    </div>

    <script th:src="@{/js/active.js}"></script>
    <script>
        (() => {
            "use strict";

            const startForm = document.getElementById('ai-chat-form-start');
            const topicInput = document.getElementById('ai-user-query-start');
            const responseWrap = document.getElementById('ai-response-wrapper');

            function escapeHtml(value = '') {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function isSafeHttpUrl(value) {
                return /^https?:\/\//i.test(String(value || '').trim());
            }

            function formatParagraphs(value) {
                const text = String(value || '').trim();
                if (!text) {
                    return '<p class="aprende-empty">Sin contenido disponible por ahora.</p>';
                }

                return text
                    .split(/\n{2,}/)
                    .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`)
                    .join('');
            }

            function formatList(items) {
                const safeItems = Array.isArray(items) ? items.filter(Boolean) : [];
                if (!safeItems.length) {
                    return '<li class="aprende-empty">Sin información disponible.</li>';
                }

                return safeItems
                    .map(item => `<li>${escapeHtml(item)}</li>`)
                    .join('');
            }

            function formatVocabulary(items) {
                const safeItems = Array.isArray(items)
                    ? items.filter(item => item && (item.term || item.definition))
                    : [];

                if (!safeItems.length) {
                    return '<p class="aprende-empty">Todavía no hay vocabulario para mostrar.</p>';
                }

                return safeItems
                    .map(item => `
                        <article class="aprende-vocab-item">
                            <strong>${escapeHtml(item.term || 'Término')}</strong>
                            <span>${escapeHtml(item.definition || 'Definición no disponible.')}</span>
                        </article>
                    `)
                    .join('');
            }

            function formatReferences(items) {
                const safeItems = Array.isArray(items)
                    ? items.filter(item => item && item.title).slice(0, 4)
                    : [];

                if (!safeItems.length) {
                    return '<p class="aprende-empty">Todavía no hay referencias para este tema.</p>';
                }

                return safeItems
                    .map(item => {
                        const title = escapeHtml(item.title || 'Fuente');
                        const type = escapeHtml((item.type || 'lectura').toString());
                        const source = escapeHtml(item.source || 'Referencia sugerida');
                        const url = item.url || '';

                        if (isSafeHttpUrl(url)) {
                            return `
                                <a class="aprende-reference" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">
                                    <span class="aprende-reference-icon">${type === 'video' ? '▶' : '↗'}</span>
                                    <span class="aprende-reference-body">
                                        <span class="aprende-reference-title">${title}</span>
                                        <span class="aprende-reference-meta">${type} · ${source}</span>
                                    </span>
                                </a>
                            `;
                        }

                        return `
                            <div class="aprende-reference">
                                <span class="aprende-reference-icon">${type === 'video' ? '▶' : '◌'}</span>
                                <span class="aprende-reference-body">
                                    <span class="aprende-reference-title">${title}</span>
                                    <span class="aprende-reference-meta">${type} · ${source}</span>
                                </span>
                            </div>
                        `;
                    })
                    .join('');
            }

            function formatSuggestions(items) {
                const safeItems = Array.isArray(items) ? items.filter(Boolean) : [];

                if (!safeItems.length) {
                    return '';
                }

                return safeItems
                    .map(item => `<button type="button" class="aprende-chip aprende-chip--suggestion" data-followup="${escapeHtml(item)}">${escapeHtml(item)}</button>`)
                    .join('');
            }

            function showLoading(query) {
                responseWrap.hidden = false;
                responseWrap.classList.add('is-visible');
                responseWrap.innerHTML = `
                    <div class="aprende-response-inner">
                        <div class="aprende-loading-card">
                            <div class="aprende-spinner" aria-hidden="true"></div>
                            <h2>Construyendo la lección</h2>
                            <p>
                                Classify está organizando la explicación, el vocabulario, la aplicación pedagógica y
                                las referencias para <strong>${escapeHtml(query)}</strong>.
                            </p>
                        </div>
                    </div>
                `;
                responseWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function showError(message) {
                responseWrap.hidden = false;
                responseWrap.classList.add('is-visible');
                responseWrap.innerHTML = `
                    <div class="aprende-response-inner">
                        <article class="aprende-panel aprende-panel--error">
                            <p class="aprende-error-title">No fue posible generar la lección</p>
                            <p class="aprende-text">${escapeHtml(message)}</p>
                        </article>
                    </div>
                `;
                responseWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function parseLLMJson(raw) {
                const cleaned = String(raw || '').replace(/```json\s*|```/g, '').trim();
                return JSON.parse(cleaned);
            }

            async function executeInquiry(query) {
                const cleanedQuery = String(query || '').trim();
                if (!cleanedQuery) {
                    topicInput.focus();
                    return;
                }

                topicInput.value = cleanedQuery;
                showLoading(cleanedQuery);

                try {
                    const response = await fetch('/aprende/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [
                                { role: 'user', content: cleanedQuery }
                            ]
                        })
                    });

                    if (!response.ok) {
                        throw new Error('La respuesta del servidor no fue correcta. Intenta nuevamente.');
                    }

                    const data = await response.json();
                    const ai = parseLLMJson(data.content);
                    renderAI(ai, cleanedQuery);
                } catch (error) {
                    console.error('Error en Aprende:', error);
                    showError('Revisa tu conexión e inténtalo de nuevo con un tema más específico.');
                }
            }

            function renderAI(ai, query) {
                const breadcrumb = escapeHtml(ai.breadcrumb || query || 'Aprende');
                const title = escapeHtml(ai.title || query || 'Lección generada');
                const intro = formatParagraphs(ai.introduction);
                const content = formatParagraphs(ai.content);
                const pedagogical = formatParagraphs(ai.pedagogical_application);
                const curiosity = formatParagraphs(ai.curiosity);
                const keyPoints = formatList(ai.key_points);
                const vocabulary = formatVocabulary(ai.vocabulary);
                const references = formatReferences(ai.references);
                const suggestions = formatSuggestions(ai.suggestions);

                responseWrap.innerHTML = `
                    <div class="aprende-response-inner">
                        <div class="aprende-response-header">
                            <span class="aprende-breadcrumb">${breadcrumb}</span>
                            <h2 class="aprende-response-title">${title}</h2>
                            <div class="aprende-response-intro">${intro}</div>
                        </div>

                        <div class="aprende-response-grid">
                            <div class="aprende-response-stack">
                                <article class="aprende-panel">
                                    <h3>Desarrollo del tema</h3>
                                    <div class="aprende-text">${content}</div>
                                </article>

                                <article class="aprende-panel aprende-panel--accent">
                                    <h3>Aplicación pedagógica</h3>
                                    <div class="aprende-text">${pedagogical || '<p class="aprende-empty">Sin sugerencias pedagógicas para mostrar.</p>'}</div>
                                </article>
                            </div>

                            <div class="aprende-response-stack">
                                <article class="aprende-panel">
                                    <h3>Vocabulario clave</h3>
                                    <div class="aprende-vocab-grid">${vocabulary}</div>
                                </article>

                                <article class="aprende-panel">
                                    <h3>Material de consulta</h3>
                                    <div class="aprende-reference-list">${references}</div>
                                </article>
                            </div>
                        </div>

                        <article class="aprende-panel">
                            <h3>Conceptos para recordar</h3>
                            <ul class="aprende-list">${keyPoints}</ul>
                        </article>

                        <article class="aprende-panel aprende-curiosity">
                            <h3>Dato para el aula</h3>
                            <div class="aprende-text">${curiosity || '<p class="aprende-empty">Todavía no hay una curiosidad para compartir.</p>'}</div>
                        </article>

                        <article class="aprende-panel aprende-suggestions-panel">
                            <h3>Seguir explorando</h3>
                            <p class="aprende-help">Elige uno de estos temas para profundizar sin salir del módulo.</p>
                            <div class="aprende-suggestions-row">${suggestions || '<span class="aprende-empty">No hay sugerencias disponibles todavía.</span>'}</div>
                        </article>
                    </div>
                `;

                responseWrap.hidden = false;
                responseWrap.classList.add('is-visible');
                responseWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            startForm.addEventListener('submit', (event) => {
                event.preventDefault();
                executeInquiry(topicInput.value);
            });

            document.addEventListener('click', (event) => {
                const button = event.target.closest('[data-followup]');
                if (!button) return;
                executeInquiry(button.dataset.followup);
            });
        })();
    </script>
</body>
</html>
