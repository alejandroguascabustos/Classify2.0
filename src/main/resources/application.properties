spring.application.name=classify2.0
server.port=8080
classify.webhooks.welcome.url=https://n8n.classify.in.net/webhook/a54058de-22a2-488b-956c-21bc5520d6a0

# Webhook Contacta un Profe
classify.webhooks.contacta.url=https://n8n.classify.in.net/webhook/b6400a0a-053a-4aa1-b389-56eaec481db4

# Webhook Contacto General (Landing) - PRODUCCIÓN (Activo)
classify.webhooks.contacto.url=https://n8n.classify.in.net/webhook/1b573e49-3bdc-4985-a993-ff2798735d57

# Webhook Registro Docente - PRODUCCION (Activo)
classify.webhooks.registro-docente.url=https://n8n.classify.in.net/webhook/bbab4100-3e6e-44cd-98e6-f62e6d3f65af

# Webhook Recuperacion de Contrasena - PRODUCCION
classify.webhooks.password-reset.url=https://n8n.classify.in.net/webhook/bcf92582-cf51-4d56-a0e1-15ad9f2b9783
classify.password-reset.page-url=http://localhost:8090/recuperar-password/cambiar
classify.password-reset.token-minutes=15

#No tocar
spring.web.resources.static-locations=classpath:/static/
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
server.servlet.session.timeout=10m
server.servlet.session.cookie.max-age=-1
server.servlet.session.cookie.http-only=true
# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/classify}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:classify_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=ClassifyPrimaryPool

# Configuración de Groq (Llama 3.3) para Módulo Aprende
groq.api.key=${GROQ_API_KEY:}

# ── Directorio de uploads ─────────────────────────────────────
# Ruta absoluta donde se guardarán las imágenes subidas.
# Cambia esta ruta según tu entorno:
# Windows: C:/classify-uploads
# Linux/Mac: /home/servidor/classify-uploads
classify.upload.path=uploads



# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Evita el warning de JPA open-in-view
spring.jpa.open-in-view=false

# ── Multipart (subida de imágenes) ───────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB



#Tiempo real
spring.thymeleaf.cache=false
