# ── Directorio de uploads ─────────────────────────────────────
# Ruta absoluta donde se guardarán las imágenes subidas.
# Cambia esta ruta según tu entorno:
# Windows: C:/classify-uploads
# Linux/Mac: /home/tu-usuario/classify-uploads
classify.upload.path=C:/classify-uploads



# ── JPA / Hibernate ───────────────────────────────────────────
# El DataSource principal se resuelve desde la configuración unificada de Classify
# usando PostgreSQL cuando está disponible y H2 local como respaldo.
# validate = Hibernate valida que la BD coincida con las entidades (no modifica)
# update  = crea/modifica columnas automáticamente (usar solo en desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
 
# Evita el warning de JPA open-in-view
spring.jpa.open-in-view=false

# ── Multipart (subida de imágenes) ───────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB