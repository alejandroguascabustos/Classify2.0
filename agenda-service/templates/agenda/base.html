{% load static %}
<!DOCTYPE html>
<!--
  Plantilla base del módulo Programación (Python/Django).
  Estructura modular:
    - CSS global de la plataforma: style.css servido por Spring Boot (8090)
    - CSS propio del módulo:       static/css/programacion.css
    - Header y sidebar:            templates/agenda/partials/
  Cada vista hereda de esta base y solo define su bloque "contenido".
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Classify - Programación{% endblock %}</title>
    <link rel="stylesheet" href="http://localhost:8090/css/style.css">
    <link rel="stylesheet" href="{% static 'css/programacion.css' %}">
    <link rel="shortcut icon" href="http://localhost:8090/img/favicon.ico" type="image/x-icon">
</head>
<body>
    {% include "agenda/partials/header.html" %}
    {% include "agenda/partials/sidebar.html" %}

    <main class="{% block main_class %}contentprincipal{% endblock %}">
        {% block contenido %}{% endblock %}
    </main>
</body>
</html>
