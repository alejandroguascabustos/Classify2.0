<!DOCTYPE html>
<!--
  Plantilla mínima para el flujo SIN AJAX (fallback del controller Java
  que devolvía "agenda/agenda" con "mensaje" o "error").
  La página completa de agenda sigue siendo servida por la app Spring Boot.
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda - Classify 2.0</title>
</head>
<body>
    {% if mensaje %}
    <div class="alert-success"><p>{{ mensaje }}</p></div>
    {% endif %}

    {% if error %}
    <div class="alert-error"><p>{{ error }}</p></div>
    {% endif %}

    <p><a href="http://localhost:8090/agenda">Volver al formulario de agenda</a></p>
</body>
</html>
